<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal Hero - Achievement Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .stats-card {
            background: #1e1e2f;
            justify-content: center;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #2a2a3e;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-item {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
            border-radius: 15px;
            color: white;
            border: 1px solid #2a2a3e;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            display: block;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-top: 5px;
        }

        .progress-section {
            margin-bottom: 30px;
        }

        .progress-section h3 {
            margin-bottom: 15px;
            color: #e0e0e0;
        }

        .progress-bar-container {
            background: #2a2a3e;
            border-radius: 20px;
            height: 30px;
            overflow: hidden;
            position: relative;
            border: 1px solid #3a3a4e;
            isolation: isolate;
        }

        .progress-bar-markers {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .progress-marker {
            position: absolute;
            top: 4px;
            bottom: 4px;
            width: 2px;
            background: rgba(255, 255, 255, 0.18);
            transform: translateX(-50%);
            border-radius: 999px;
        }

        .progress-bar {
            position: relative;
            height: 100%;
            width: 100%;
        }

        .progress-fill {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 0%;
            background: linear-gradient(90deg, #e94560 0%, #f27121 100%);
            transition: width 0.6s ease;
            box-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
            z-index: 2;
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            text-align: center;
            color: #ffffff;
            font-weight: bold;
            z-index: 3;
            pointer-events: none;
            transition: color 0.3s ease, text-shadow 0.3s ease;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.45);
        }

        .progress-text.on-light-fill {
            color: #1a1a2e;
            text-shadow: none;
        }

        .badges-section {
            margin-top: 30px;
        }

        .badges-section h3 {
            margin-bottom: 20px;
            color: #e0e0e0;
        }

        .badges-category {
            margin-bottom: 30px;
        }

        .badges-category h4 {
            color: #e0e0e0;
            margin-bottom: 15px;
            font-size: 1.1em;
            text-align: center;
        }

        .badges-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            max-width: 600px;
            margin: 0 auto;
        }

        .badge {
            text-align: center;
            padding: 15px;
            border-radius: 15px;
            transition: transform 0.3s ease;
            width: 120px;
        }

        .badge.unlocked {
            background: linear-gradient(135deg, #e94560 0%, #f27121 100%);
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.6);
            border: 1px solid #ff6b6b;
        }

        .badge.locked {
            background: #2a2a3e;
            opacity: 0.5;
            border: 1px solid #3a3a4e;
        }

        .badge:hover {
            transform: scale(1.05);
        }

        .badge-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .badge-title {
            font-weight: bold;
            font-size: 0.9em;
            margin-bottom: 5px;
            color: white;
        }

        .badge.locked .badge-title {
            color: inherit;
        }

        .badge-desc {
            font-size: 0.75em;
            color: white;
        }

        .badge.locked .badge-desc {
            color: #b0b0b0;
        }

        .add-victory {
            background: linear-gradient(135deg, #e94560 0%, #f27121 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4);
            display: none;
        }

        .add-victory:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(233, 69, 96, 0.6);
        }

        .input-section {
            margin-bottom: 20px;
            display: none;
        }

        .input-section label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #e0e0e0;
        }

        .input-section input {
            width: 100%;
            padding: 10px;
            border: 2px solid #3a3a4e;
            border-radius: 8px;
            font-size: 1em;
            background: #2a2a3e;
            color: #e0e0e0;
        }

        .input-section input:focus {
            outline: none;
            border-color: #e94560;
        }

        .celebration {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1e1e2f;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            border: 2px solid #e94560;
            text-align: center;
            display: none;
            z-index: 1000;
            animation: popIn 0.5s ease;
        }

        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        .celebration h2 {
            color: #e94560;
            margin-bottom: 20px;
            font-size: 2em;
        }

        .celebration .badge-icon {
            font-size: 5em;
        }

        .close-celebration {
            background: #e94560;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s ease;
        }

        .close-celebration:hover {
            background: #f27121;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            z-index: 999;
        }
		.logo {
		  width: 80%;
		  height: auto;
		}
    
@media (max-width:600px){
  .stats-grid{
    grid-template-columns: 1fr;
    justify-items: center;
    gap:15px;
  }
  .stat-item{
    width:100%;
    max-width:260px;
  }
}

</style>
</head>
<body>
    <div class="overlay" id="overlay"></div>

    <div class="container">
        <div class="header">
			<img src="hero_wide.png" alt="Legal Hero - Achievement Tracker Logo" class="logo">
            <!--<h1>⚖️ Legal Hero - Achievement Tracker</h1>
            <p>Tracking epic legal victories!</p>-->
        </div>

        <div class="stats-card">
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-value" id="totalVictories">0</span>
                    <span class="stat-label">Victories</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value">€<span id="totalSaved">0</span></span>
                    <span class="stat-label">Money Saved</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="beerVouchers">0</span>
                    <span class="stat-label">🍺 Beer Vouchers</span>
                </div>
            </div>

            <div class="progress-section">
                <h3>Next Victory Milestone (5 wins)</h3>
                <div class="progress-bar-container">
                    <div class="progress-bar-markers" id="victoryMarkers"></div>
                    <div class="progress-bar" id="victoryProgress">
                        <div class="progress-fill"></div>
                        <div class="progress-text">0/0</div>
                    </div>
                </div>
            </div>

            <div class="progress-section">
                <h3>Next Money Milestone</h3>
                <div class="progress-bar-container">
                    <div class="progress-bar-markers" id="moneyMarkers"></div>
                    <div class="progress-bar" id="moneyProgress">
                        <div class="progress-fill"></div>
                        <div class="progress-text">€0/€0</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="stats-card badges-section">
            <h3>🏆 Achievement Badges</h3>
            
            <div class="badges-category">
                <h4>⚖️ Victory Badges</h4>
                <div class="badges-grid" id="victoryBadgesGrid"></div>
            </div>
            
            <div class="badges-category">
                <h4>💰 Money Saved Badges</h4>
                <div class="badges-grid" id="moneyBadgesGrid"></div>
            </div>
        </div>
    </div>

    <script>
        // ====================================
        // 🎮 ADJUST THESE VALUES MANUALLY 🎮
        // ====================================
        const TOTAL_VICTORIES = 3;        // Number of victories
        const TOTAL_MONEY_SAVED = 5334.15;   // Money saved in euros
        // ====================================

        
        // ====================================
        // BADGE CONFIG (only edit numbers here)
        // ====================================

        const badgeValues = {
            victories: [1, 5, 10],
            money: [500, 1000, 2500, 5000, 7500]
        };

        const badgeMeta = {
            victories: {
                icons: ['🎯','⭐','🌟','🏆','👑'],
                titlePrefix: 'Victory',
                desc: (v)=> `${v} victories`
            },
            money: {
                icons: ['💰','💎','👑','🏆','🚀'],
                titlePrefix: 'Money Saver',
                desc: (v)=> `Save €${v}`
            }
        };

        function generateBadges(){
            const badges = [];

            Object.keys(badgeValues).forEach(type=>{
                badgeValues[type].forEach((value,i)=>{
                    badges.push({
                        id: `${type}_${value}`,
                        icon: badgeMeta[type].icons[i] || badgeMeta[type].icons[badgeMeta[type].icons.length-1],
                        title: `${badgeMeta[type].titlePrefix} ${value}`,
                        desc: badgeMeta[type].desc(value),
                        requirement: { type: type, value: value },
                        unlocked: false
                    });
                });
            });

            return badges;
        }

        const badges = generateBadges();


        let gameState = {
            victories: TOTAL_VICTORIES,
            moneySaved: TOTAL_MONEY_SAVED,
            beerVouchers: 0,
            badges: badges
        };

        function checkAchievements() {
            gameState.beerVouchers = 0;
            
            gameState.badges.forEach(badge => {
                if (badge.requirement.type === 'victories' && gameState.victories >= badge.requirement.value) {
                    badge.unlocked = true;
                    gameState.beerVouchers++;
                } else if (badge.requirement.type === 'money' && gameState.moneySaved >= badge.requirement.value) {
                    badge.unlocked = true;
                    gameState.beerVouchers++;
                }
            });
        }

        function init() {
            checkAchievements();
            renderBadges();
            updateDisplay();
        }

        function getMilestonesByType(type) {
            return [...new Set(
                gameState.badges
                    .filter(badge => badge.requirement.type === type)
                    .map(badge => badge.requirement.value)
            )].sort((a, b) => a - b);
        }

        function getProgressMilestones(currentValue, type) {
            const milestones = getMilestonesByType(type);
            const nextMilestone = milestones.find(value => currentValue < value) ?? milestones[milestones.length - 1] ?? 0;
            const nextMilestoneIndex = milestones.indexOf(nextMilestone);
            const previousMilestone = nextMilestoneIndex > 0 ? milestones[nextMilestoneIndex - 1] : 0;

            return {
                previousMilestone,
                nextMilestone,
                milestones
            };
        }

        function updateProgressBar(barId, markersId, progressPercent, label, milestones, previousMilestone, nextMilestone) {
            const bar = document.getElementById(barId);
            const fill = bar.querySelector('.progress-fill');
            const text = bar.querySelector('.progress-text');
            const markers = document.getElementById(markersId);

            fill.style.width = `${Math.max(0, Math.min(progressPercent, 100))}%`;
            text.textContent = label;
            text.classList.toggle('on-light-fill', progressPercent > 70);

            markers.innerHTML = '';
            const range = Math.max(nextMilestone - previousMilestone, 1);
            milestones
                .filter(value => value > previousMilestone && value < nextMilestone)
                .forEach(value => {
                    const marker = document.createElement('div');
                    marker.className = 'progress-marker';
                    marker.style.left = `${((value - previousMilestone) / range) * 100}%`;
                    markers.appendChild(marker);
                });
        }

        function updateDisplay() {
            document.getElementById('totalVictories').textContent = gameState.victories;
            document.getElementById('totalSaved').textContent = gameState.moneySaved.toFixed(0);
            document.getElementById('beerVouchers').textContent = gameState.beerVouchers;

            const victoryData = getProgressMilestones(gameState.victories, 'victories');
            const victoryMilestoneRange = Math.max(victoryData.nextMilestone - victoryData.previousMilestone, 1);
            const victoryProgress = Math.min(((gameState.victories - victoryData.previousMilestone) / victoryMilestoneRange) * 100, 100);
            updateProgressBar(
                'victoryProgress',
                'victoryMarkers',
                victoryProgress,
                `${gameState.victories}/${victoryData.nextMilestone}`,
                victoryData.milestones,
                victoryData.previousMilestone,
                victoryData.nextMilestone
            );

            const victorySection = document.querySelectorAll('.progress-section')[0];
            if (victorySection) {
                victorySection.querySelector('h3').textContent = `Next Victory Milestone (${victoryData.nextMilestone} wins)`;
            }

            const moneyData = getProgressMilestones(gameState.moneySaved, 'money');
            const moneyMilestoneRange = Math.max(moneyData.nextMilestone - moneyData.previousMilestone, 1);
            const moneyProgress = Math.min(((gameState.moneySaved - moneyData.previousMilestone) / moneyMilestoneRange) * 100, 100);
            updateProgressBar(
                'moneyProgress',
                'moneyMarkers',
                moneyProgress,
                `€${gameState.moneySaved.toFixed(0)}/€${moneyData.nextMilestone}`,
                moneyData.milestones,
                moneyData.previousMilestone,
                moneyData.nextMilestone
            );
            
            const moneySection = document.querySelectorAll('.progress-section')[1];
            if (moneySection) {
                moneySection.querySelector('h3').textContent = `Next Money Milestone (€${moneyData.nextMilestone})`;
            }
        }

        function renderBadges() {
            const victoryGrid = document.getElementById('victoryBadgesGrid');
            const moneyGrid = document.getElementById('moneyBadgesGrid');
            victoryGrid.innerHTML = '';
            moneyGrid.innerHTML = '';

            gameState.badges.forEach(badge => {
                const badgeEl = document.createElement('div');
                badgeEl.className = `badge ${badge.unlocked ? 'unlocked' : 'locked'}`;
                badgeEl.innerHTML = `
                    <div class="badge-icon">${badge.unlocked ? badge.icon : '🔒'}</div>
                    <div class="badge-title">${badge.title}</div>
                    <div class="badge-desc">${badge.desc}</div>
                `;
                
                if (badge.requirement.type === 'victories') {
                    victoryGrid.appendChild(badgeEl);
                } else {
                    moneyGrid.appendChild(badgeEl);
                }
            });
        }

        init();
    </script>
</body>
</html>
